<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Booth 3 Foto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

video{
    width:480px;
    height:360px;
    border-radius:15px;
}

button{
    margin:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}

#countdown{
    font-size:70px;
    font-weight:bold;
    color:#ffcc00;
}

canvas{
    display:none;
}
</style>
</head>

<body>

<h1>PHOTO BOOTH EVENT</h1>

<video id="video" autoplay></video>
<br>
<div id="countdown"></div>
<button onclick="startCapture()">📸 MULAI FOTO</button>

<canvas id="canvas"></canvas>

<h3>Scan QR untuk Download</h3>
<div id="qrcode"></div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let countdownEl = document.getElementById("countdown");

let frameImg = new Image();
frameImg.src = "frame.png";

let logoImg = new Image();
logoImg.src = "logo.png";

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
    video.srcObject = stream;
});

let photos = [];

function startCapture(){
    photos = [];
    takePhoto(3);
}

function takePhoto(times){

    if(times === 0){
        createFinalImage();
        return;
    }

    let count = 3;
    countdownEl.innerHTML = count;

    let interval = setInterval(()=>{
        count--;
        countdownEl.innerHTML = count;

        if(count === 0){
            clearInterval(interval);

            let tempCanvas = document.createElement("canvas");
            tempCanvas.width = 480;
            tempCanvas.height = 360;
            let tempCtx = tempCanvas.getContext("2d");

            tempCtx.drawImage(video,0,0,480,360);
            tempCtx.drawImage(frameImg,0,0,480,360);
            tempCtx.drawImage(logoImg,180,10,120,120);

            tempCtx.fillStyle = "white";
            tempCtx.font = "bold 18px Arial";
            tempCtx.textAlign = "center";
            tempCtx.fillText("KEMENTERIAN HAJI DAN UMRAH",240,150);
            tempCtx.fillText("KAB. MAGELANG",240,175);

            photos.push(tempCanvas);

            takePhoto(times-1);
        }
    },1000);
}

function createFinalImage(){

    canvas.width = 480;
    canvas.height = 1080; // 3 x 360
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,480,1080);

    ctx.drawImage(photos[0],0,0);
    ctx.drawImage(photos[1],0,360);
    ctx.drawImage(photos[2],0,720);

    let finalImage = canvas.toDataURL("image/png");

    generateQR(finalImage);

    countdownEl.innerHTML = "SELESAI!";
}

function generateQR(link){
    let qr = document.getElementById("qrcode");
    qr.innerHTML = "";
    new QRCode(qr,{
        text: link,
        width:200,
        height:200
    });
}
</script>

</body>
</html>
