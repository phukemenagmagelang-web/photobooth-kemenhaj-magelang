<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Booth PRO FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

#container{
    position:relative;
    display:inline-block;
}

video{
    width:640px;
    height:480px;
    border-radius:15px;
}

button{
    margin:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}

#countdown{
    font-size:70px;
    font-weight:bold;
    color:#ffcc00;
    margin:20px;
}

#qrContainer{
    display:flex;
    justify-content:center;
    gap:50px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>PHOTO BOOTH EVENT</h1>

<div id="container">
    <video id="video" autoplay></video>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<div id="countdown"></div>

<button onclick="startCapture()">📸 MULAI FOTO</button>

<div id="qrContainer">
    <div>
        <h3>Download FOTO</h3>
        <div id="qrFoto"></div>
    </div>
    <div>
        <h3>Download GIF</h3>
        <div id="qrGif"></div>
    </div>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let countdownEl = document.getElementById("countdown");

let frameImg = new Image();
frameImg.src = "frame.png";

let logoImg = new Image();
logoImg.src = "logo.png";

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
    video.srcObject = stream;
});

let photos = [];

function startCapture(){
    photos = [];
    takePhoto(3);
}

function takePhoto(times){
    if(times == 0){
        createResult();
        return;
    }

    let count = 3;
    countdownEl.innerHTML = count;

    let interval = setInterval(()=>{
        count--;
        countdownEl.innerHTML = count;

        if(count == 0){
            clearInterval(interval);

            ctx.drawImage(video,0,0,640,480);

            // Tambahkan frame
            ctx.drawImage(frameImg,0,0,640,480);

            // Tambahkan logo
            ctx.drawImage(logoImg,260,20,120,120);

            // Tambahkan tulisan instansi
            ctx.fillStyle = "white";
            ctx.font = "bold 22px Arial";
            ctx.textAlign = "center";
            ctx.fillText("KEMENTERIAN HAJI DAN UMRAH",320,170);
            ctx.fillText("KAB. MAGELANG",320,200);

            photos.push(canvas.toDataURL("image/png"));

            takePhoto(times-1);
        }
    },1000);
}

function createResult(){

    let fotoFinal = photos[0];

    // QR FOTO
    generateQR("qrFoto", fotoFinal);

    // BUAT GIF
    let gif = new GIF({
        workers:2,
        quality:10,
        width:640,
        height:480
    });

    photos.forEach(p=>{
        let img = document.createElement("img");
        img.src = p;
        gif.addFrame(img,{delay:800});
    });

    gif.on('finished',function(blob){
        let gifURL = URL.createObjectURL(blob);
        generateQR("qrGif", gifURL);
        countdownEl.innerHTML = "SELESAI!";
    });

    gif.render();
}

function generateQR(id, link){
    let el = document.getElementById(id);
    el.innerHTML = "";
    new QRCode(el,{
        text: link,
        width:180,
        height:180
    });
}
</script>

</body>
</html>
