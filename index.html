<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photobooth Kemenhaj</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial;
}

header{
    padding:20px;
}

header img{
    width:120px;
}

video{
    width:500px;
    border-radius:10px;
}

#countdown{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:120px;
    font-weight:bold;
    color:gold;
    text-shadow:0 0 20px gold;
    display:none;
}

button{
    padding:12px 25px;
    font-size:16px;
    margin:10px;
}

#resultImage{
    width:400px;
    margin-top:20px;
}

#qrcode{
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <img src="logo.png">
    <h2>Kementerian Haji dan Umrah Kab. Magelang</h2>
</header>

<div style="position:relative;">
    <video id="video" autoplay></video>
    <div id="countdown"></div>
</div>

<br>

<input type="file" id="frameUpload" accept="image/png">
<br>
<button onclick="startCapture()">START FOTO (3x)</button>

<canvas id="canvas" style="display:none;"></canvas>

<br>

<img id="resultImage">
<div id="qrcode"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let capturedPhotos = [];
let uploadedFrame = null;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

document.getElementById("frameUpload").addEventListener("change", function(e){
    let reader = new FileReader();
    reader.onload = function(event){
        uploadedFrame = new Image();
        uploadedFrame.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

function startCapture(){
    capturedPhotos = [];
    captureWithCountdown(3,0);
}

function captureWithCountdown(seconds,count){

    if(count >= 3){
        generateStrip();
        generateGIF();
        return;
    }

    let cd = document.getElementById("countdown");
    cd.style.display = "block";
    cd.innerText = seconds;

    if(seconds > 0){
        setTimeout(()=>captureWithCountdown(seconds-1,count),1000);
    }else{
        canvas.width = 500;
        canvas.height = 400;
        ctx.drawImage(video,0,0,500,400);
        capturedPhotos.push(canvas.toDataURL("image/jpeg"));
        cd.style.display = "none";
        setTimeout(()=>captureWithCountdown(3,count+1),1000);
    }
}

function generateStrip(){

    let strip = document.createElement("canvas");
    let sctx = strip.getContext("2d");

    strip.width = 600;
    strip.height = 1300;

    sctx.fillStyle = "white";
    sctx.fillRect(0,0,600,1300);

    let logo = new Image();
    logo.src = "logo.png";

    logo.onload = function(){
        sctx.drawImage(logo,250,20,100,100);

        capturedPhotos.forEach((photo,i)=>{
            let img = new Image();
            img.src = photo;
            img.onload = function(){
                sctx.drawImage(img,50,150+(i*350),500,300);

                if(uploadedFrame){
                    sctx.drawImage(uploadedFrame,0,0,600,1300);
                }

                if(i === 2){
                    let finalImage = strip.toDataURL("image/jpeg");
                    document.getElementById("resultImage").src = finalImage;
                    generateQR(finalImage);
                }
            }
        });
    }
}

function generateGIF(){

    let gif = new GIF({
        workers:2,
        quality:10,
        workerScript:"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"
    });

    capturedPhotos.forEach(photo=>{
        let img = new Image();
        img.src = photo;
        gif.addFrame(img,{delay:800});
    });

    gif.on('finished',function(blob){
        let gifURL = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = gifURL;
        a.download = "photobooth.gif";
        a.innerText = "Download GIF";
        document.body.appendChild(a);
    });

    gif.render();
}

function generateQR(dataURL){
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"),{
        text:dataURL,
        width:150,
        height:150
    });
}

</script>

</body>
</html>
