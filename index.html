<script>

function generate4R(){

  const canvasFrame = document.createElement("canvas");
  const ctx = canvasFrame.getContext("2d");

  canvasFrame.width = 1800;
  canvasFrame.height = 1200;

  // ===== BACKGROUND HITAM GLOSS =====
  const bgGrad = ctx.createLinearGradient(0,0,0,1200);
  bgGrad.addColorStop(0,"#000000");
  bgGrad.addColorStop(0.5,"#111111");
  bgGrad.addColorStop(1,"#000000");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,1800,1200);

  // ===== GOLD METALLIC BORDER =====
  const gold = ctx.createLinearGradient(0,0,1800,0);
  gold.addColorStop(0,"#8f6b29");
  gold.addColorStop(0.5,"#ffd700");
  gold.addColorStop(1,"#8f6b29");

  ctx.strokeStyle = gold;
  ctx.lineWidth = 20;
  ctx.strokeRect(30,30,1740,1140);

  ctx.lineWidth = 4;
  ctx.strokeRect(80,80,1640,1040);

  // ===== GOLD LINE DECOR =====
  ctx.fillStyle = gold;
  ctx.fillRect(300,170,1200,4);
  ctx.fillRect(300,1030,1200,4);

  // ===== LOGO WITH GLOW =====
  const logo = new Image();
  logo.src = "logo.png";

  logo.onload = function(){
      ctx.shadowColor = "#ffd700";
      ctx.shadowBlur = 40;
      ctx.drawImage(logo, 750, 70, 300, 150);
      ctx.shadowBlur = 0;
  }

  // ===== FOTO SECTION =====
  let xPositions = [250, 700, 1150];
  let loaded = 0;

  for(let i=0;i<3;i++){

      const img = new Image();
      img.src = capturedPhotos[i];

      img.onload = function(){

          // cinematic shadow
          ctx.shadowColor = "rgba(0,0,0,0.9)";
          ctx.shadowBlur = 50;
          ctx.shadowOffsetY = 25;

          // white luxury frame
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(xPositions[i]-20, 320-20, 450+40, 650+40);

          ctx.shadowBlur = 0;

          ctx.drawImage(img, xPositions[i], 320, 450, 650);

          loaded++;

          if(loaded === 3){

              // ===== EMBOSS GOLD TEXT =====
              ctx.font = "bold 44px serif";
              ctx.textAlign = "center";

              ctx.fillStyle = "#8f6b29";
              ctx.fillText(
                "Kementerian Haji dan Umrah Kab. Magelang",
                900,
                1080
              );

              ctx.fillStyle = "#ffd700";
              ctx.fillText(
                "Kementerian Haji dan Umrah Kab. Magelang",
                900,
                1075
              );

              const today = new Date();
              ctx.font = "28px serif";
              ctx.fillStyle = "#ffd700";
              ctx.fillText(
                today.toLocaleDateString("id-ID"),
                900,
                1120
              );

              const finalImage = canvasFrame.toDataURL("image/jpeg",1.0);
              result.src = finalImage;

              uploadToDrive(finalImage);
              capturedPhotos = [];
          }
      }
  }

}

</script>
