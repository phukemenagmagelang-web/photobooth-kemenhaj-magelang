<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Photobooth</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}
video{
    width:500px;
    border-radius:10px;
}
canvas{
    display:none;
}
button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
}
#resultImage{
    width:400px;
    margin-top:20px;
}
#qrcode{
    margin-top:20px;
}
</style>
</head>
<body>

<h2>Event Photobooth</h2>

<input type="file" id="frameUpload" accept="image/png">

<br><br>

<video id="video" autoplay></video>

<br>

<button onclick="startCapture()">Start Photo (3x)</button>

<canvas id="canvas"></canvas>

<br>

<img id="resultImage">
<div id="qrcode"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let capturedPhotos = [];
let uploadedFrame = null;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream => {
    video.srcObject = stream;
});

document.getElementById("frameUpload").addEventListener("change", function(e){
    let reader = new FileReader();
    reader.onload = function(event){
        uploadedFrame = new Image();
        uploadedFrame.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

function startCapture(){
    capturedPhotos = [];
    capturePhoto(0);
}

function capturePhoto(count){
    if(count >= 3){
        generateStrip();
        generateGIF();
        return;
    }

    setTimeout(()=>{
        canvas.width = 500;
        canvas.height = 400;
        ctx.drawImage(video,0,0,500,400);
        capturedPhotos.push(canvas.toDataURL("image/jpeg"));
        capturePhoto(count+1);
    },2000);
}

function generateStrip(){

    let strip = document.createElement("canvas");
    let sctx = strip.getContext("2d");

    strip.width = 600;
    strip.height = 1200;

    sctx.fillStyle = "white";
    sctx.fillRect(0,0,600,1200);

    let loaded = 0;

    capturedPhotos.forEach((photo,i)=>{
        let img = new Image();
        img.src = photo;
        img.onload = function(){
            sctx.drawImage(img,50,50+(i*350),500,300);

            if(uploadedFrame){
                sctx.drawImage(uploadedFrame,0,0,600,1200);
            }

            loaded++;
            if(loaded === 3){
                let finalImage = strip.toDataURL("image/jpeg");
                document.getElementById("resultImage").src = finalImage;
                generateQR(finalImage);
            }
        }
    });
}

function generateGIF(){

    let gif = new GIF({
        workers:2,
        quality:10,
        workerScript:"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"
    });

    capturedPhotos.forEach(photo=>{
        let img = new Image();
        img.src = photo;
        gif.addFrame(img,{delay:800});
    });

    gif.on('finished',function(blob){
        let gifURL = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = gifURL;
        a.download = "photobooth.gif";
        a.innerText = "Download GIF";
        document.body.appendChild(a);
    });

    gif.render();
}

function generateQR(dataURL){
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: dataURL,
        width:150,
        height:150
    });
}

</script>

</body>
</html>
