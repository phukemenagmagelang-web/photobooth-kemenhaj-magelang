<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth - Kemenhaj Kab Magelang</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

video{
  width:100%;
  max-height:60vh;
  border:5px solid gold;
  border-radius:20px;
}

#countdown{
  position:absolute;
  width:100%;
  top:40%;
  font-size:100px;
  color:gold;
  font-weight:bold;
}

button{
  padding:15px 30px;
  font-size:18px;
  background:gold;
  border:none;
  border-radius:10px;
  margin-top:20px;
  font-weight:bold;
}

canvas{display:none;}

#result{
  margin-top:20px;
  width:95%;
}

#qrSection{
  margin-top:20px;
  display:none;
}
</style>
</head>
<body>

<h2>KEMENTERIAN HAJI DAN UMRAH</h2>
<h3>KABUPATEN MAGELANG</h3>

<div style="position:relative;">
  <video id="video" autoplay playsinline></video>
  <div id="countdown"></div>
</div>

<canvas id="canvas"></canvas>
<button onclick="startCountdown()">Ambil Foto</button>

<img id="result">

<div id="qrSection">
  <h3>📱 Scan QR untuk Mengunduh Foto</h3>
  <div id="qrcode"></div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz55-o4m_PTZTFk_B2dtZfexxEyy-w-ORv0mEgndBeNNEClGnQrxfv0Wc4lQZ6yMMH2/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const result = document.getElementById("result");
const countdownEl = document.getElementById("countdown");

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"user"}
}).then(stream=>{
  video.srcObject = stream;
});

function startCountdown(){
  let count = 3;
  countdownEl.innerText = count;

  const interval = setInterval(()=>{
    count--;
    if(count>0){
      countdownEl.innerText = count;
    }else{
      clearInterval(interval);
      countdownEl.innerText="";
      capture();
    }
  },1000);
}

function capture(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);
  generate4R(canvas.toDataURL("image/jpeg",1.0));
}

function generate4R(photoData){

  const layoutCanvas = document.createElement("canvas");
  const ctx = layoutCanvas.getContext("2d");

  layoutCanvas.width = 1800;
  layoutCanvas.height = 1200;

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,1800,1200);

  ctx.fillStyle="gold";
  ctx.font="bold 80px Arial";
  ctx.textAlign="center";
  ctx.fillText("KEMENTERIAN HAJI DAN UMRAH",900,120);
  ctx.fillText("KABUPATEN MAGELANG",900,200);

  const img = new Image();
  img.src = photoData;

  img.onload = function(){
    ctx.drawImage(img,300,250,1200,750);

    ctx.font="40px Arial";
    ctx.fillText("Photo Booth Kantor",900,1100);

    const finalImage = layoutCanvas.toDataURL("image/jpeg",1.0);
    result.src = finalImage;

    uploadToDrive(finalImage);
  }
}

function uploadToDrive(imageData){

fetch(WEB_APP_URL,{
  method:"POST",
  body:JSON.stringify({image:imageData})
})
.then(res=>res.json())
.then(data=>{

  generateQR(data.url);

});
}

function generateQR(url){

  document.getElementById("qrSection").style.display="block";
  document.getElementById("qrcode").innerHTML="";

  new QRCode(document.getElementById("qrcode"),{
    text:url,
    width:220,
    height:220
  });
}

</script>

</body>
</html>
